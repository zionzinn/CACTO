services:
  - type: web
    name: cacto-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APP_VERSION
        value: 1.0.0
      - key: PYTHON_VERSION
        value: 3.11.0
